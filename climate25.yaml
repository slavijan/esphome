substitutions:
  name: climate25
  friendly_name: "Climate 25m2"

packages:
  - !include common/current-time.yaml

esp8266:
  board: esp01_1m

ota:
  platform: esphome

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

mqtt:
  broker: m4.wqtt.ru
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: 14446
  id: mqtt_slavijan

logger:

# Wi‑Fi configuration – pure Access Point mode
wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_dacha_ssid
      password: !secret wifi_dacha_password
    - ssid: !secret wifi_home_ssid
      password: !secret wifi_home_password

one_wire:
  - platform: gpio
    pin: GPIO1

sensor:
  - platform: dallas_temp
    name: temperature_1
    update_interval: 60s
    id: climate25_room_temperature

remote_transmitter:
  pin:
    number: GPIO0
    inverted: true
  carrier_duty_percent: 50%

climate:
  - platform: midea_ir
    name: "Kentatsu 25m2"
    sensor: climate25_room_temperature
    supports_heat: true
    visual:
      min_temperature: 18 °C
      max_temperature: 30 °C
      temperature_step: 1 °C
    mode_state_topic: climate25/mode_state
    mode_command_topic: climate25/mode_command
    target_temperature_state_topic: climate25/target_temperature_state
    target_temperature_command_topic: climate25/target_temperature_command

# Captive portal – opens a configuration page when clients connect
captive_portal:

web_server:
  port: 80
  local: True

