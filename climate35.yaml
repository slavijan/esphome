substitutions:
  name: climate35
  friendly_name: "Climate 35m2"

packages:
  - !include common/relay-module-switch-mqtt.yaml

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

mqtt:
  broker: m4.wqtt.ru
  username: !secret mqtt_username
  password: !secret mqtt_password
  port: 14446
  id: mqtt_slavijan

esp8266:
  board: esp01_1m

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_dacha_ssid
      password: !secret wifi_dacha_password
    - ssid: !secret wifi_home_ssid
      password: !secret wifi_home_password

captive_portal:

web_server:
  port: 80
  local: True

remote_transmitter:
  pin:
    number: GPIO0
    inverted: true
  carrier_duty_percent: 50%

climate:
  - platform: midea_ir
    name: "Kentatsu 35m2"
    sensor: room_temperature
    supports_heat: true
    visual:
      min_temperature: 18 °C
      max_temperature: 30 °C
      temperature_step: 1 °C
    mode_state_topic: climate_mode_state
    mode_command_topic: climate_mode_command
    target_temperature_state_topic: climate_target_temperature_state
    target_temperature_command_topic: climate_target_temperature_command
    fan_mode_state_topic: climate_fan_mode_state
    fan_mode_command_topic: climate_fan_mode_command

time:
  - platform: sntp
    timezone: UTC-07
    id: sntp_time

one_wire:
  - platform: gpio
    pin: GPIO1

sensor:
  - platform: dallas_temp
    name: temperature_1
    update_interval: 60s
    id: room_temperature

text_sensor:
  - platform: template
    name: "Current time"
    update_interval: 60s
    id: time_text
    lambda: |-
      char str[17];
      time_t currTime = id(sntp_time).now().timestamp;
      strftime(str, sizeof(str), "%c", localtime(&currTime));
      id(time_text).publish_state(str);
      return {str};

